version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: madgi_app
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage/app
      - logs_data:/var/www/html/storage/logs

  db:
    image: mysql:8.0
    container_name: madgi_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rh-madgi
      MYSQL_ROOT_PASSWORD: ciplus
      MYSQL_ROOT_HOST: "%"
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pciplus"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: madgi_phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ciplus
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
  storage_data:
  logs_data:
